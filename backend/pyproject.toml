[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  \.git | \.ruff_cache | \.venv | migrations | inspect_db\.py
)/
'''

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
skip_glob = ["**/migrations/*"]

[tool.ruff]
target-version = "py311"
line-length = 88
exclude = ["migrations", ".git", ".ruff_cache", ".venv", "inspect_db.py"]

[tool.ruff.lint]
select = [
    "E", "F", "W", "C90", "I", "N", "UP", "S", "B", "A", 
    "COM", "C4", "DTZ", "T10", "DJ", "SIM", "RET", "PTH", 
    "ERA", "PL", "TRY", "RUF"
]
ignore = [
    "COM812", # Conflicts with formatter
    "ISC001", # Conflicts with formatter
    "S101",   # Use of assert is common in this codebase
    "PLR2004", # Magic values in comparisons
    "TRY003", # Abstract raise to inner exception
    "ANN101", # Missing type annotation for self
    "ANN102", # Missing type annotation for cls
    "D",      # Pydocstyle (too noisy)
    "RUF012", # Mutable class attributes (extremely common in DRF/Django)
    "B904",   # raise from err (pedantic for existing code)
    "PTH",    # Pathlib (existing code uses os.path extensively)
    "UP031",  # printf-style formatting
    "S105", "S106", # Hardcoded passwords in dev/test code
]

[tool.ruff.lint.per-file-ignores]
# Broadly ignore noisy checks in all test-related files AND helper scripts
"**/tests/**" = [
    "S101", "PLR2004", "ARG001", "ARG002", "SLF001", 
    "N803", "N802", "PLR0913", "ERA001", "B017", "E501",
    "B011", "PLC0415", "RUF059", "E402", "S106", "SIM105",
    "S110", "S311", "RUF012", "A001", "SIM117", "RET504",
    "S105", "TRY002", "N806", "B008", "B007"
]
# Root scripts, conftest, and config files are exempt from strict production layout
"*.py" = ["E501", "E402", "PLC0415", "S311", "T201", "S113", "TRY203", "TRY300", "PLR0913", "PLR0915", "RUF059", "B007", "N806", "S106"]
"conftest.py" = ["E402", "PLC0415", "N806", "S106"]
"config/settings.py" = ["E501", "PLW1508"]
"**/migrations/*" = ["E501", "N806"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.vulture]
exclude = ["*migrations*", "tests", "inspect_db.py"]
ignore_decorators = ["@receiver"]
ignore_names = ["*args", "*kwargs", "kwargs", "args"]
min_confidence = 70
