services:
  prometheus:
    image: prom/prometheus:latest
    container_name: uber_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - default

  grafana:
    image: grafana/grafana:latest
    container_name: uber_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - default

  flower:
    image: mher/flower:latest
    container_name: uber_celery_flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://uber_redis:6379/1
      - FLOWER_PORT=5555
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: uber_redis_commander
    environment:
      - REDIS_HOSTS=local:uber_redis:6379:0,celery:uber_redis:6379:1
    ports:
      - "8082:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default

volumes:
  grafana_data:


networks:
  default:
    name: uber-backend_default
    external: true
