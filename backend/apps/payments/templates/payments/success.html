<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment Successful — Tripzo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .dot {
            position: absolute;
            top: -20px;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 32px;
            padding: 52px 40px 44px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }

        .icon-wrap {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 28px;
        }
        .pulse-ring {
            position: absolute;
            inset: -12px;
            border-radius: 62px;
            border: 2px solid rgba(34,197,94,0.25);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50%       { transform: scale(1.08); opacity: 1; }
        }
        .check-circle {
            width: 100px;
            height: 100px;
            border-radius: 50px;
            background: linear-gradient(135deg, #22C55E, #16a34a);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 16px 40px rgba(34,197,94,0.4);
            animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
        }
        @keyframes pop {
            from { transform: scale(0); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }
        .check-icon { font-size: 48px; line-height: 1; }

        h1 {
            font-size: 34px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin-bottom: 12px;
            animation: slideUp 0.5s ease 0.4s both;
        }
        p {
            font-size: 15px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 36px;
            animation: slideUp 0.5s ease 0.5s both;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }

        .btn {
            display: block;
            padding: 18px 32px;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
            border: none;
            animation: slideUp 0.5s ease 0.6s both;
        }
        .btn-primary {
            background: linear-gradient(135deg, #276EF1, #1a56d4);
            color: #fff;
            margin-bottom: 14px;
            box-shadow: 0 8px 24px rgba(39,110,241,0.35);
        }
        .btn-secondary {
            background: transparent;
            color: #444;
            font-size: 15px;
            font-weight: 600;
        }

        .countdown {
            font-size: 12px;
            color: #333;
            margin-top: 20px;
            animation: slideUp 0.5s ease 0.7s both;
        }
        #count { color: #276EF1; font-weight: 800; }
    </style>
</head>
<body>

    <!-- Confetti -->
    <div class="confetti-container" id="confetti"></div>

    <div class="card">
        <div class="icon-wrap">
            <div class="pulse-ring"></div>
            <div class="check-circle">
                <span class="check-icon">✓</span>
            </div>
        </div>

        <h1>Payment<br>Successful!</h1>
        <p>Your ride has been paid.<br>Returning you to the Tripzo app…</p>

        <a class="btn btn-primary" id="open-app-btn" href="#">Open Tripzo App</a>
        <button class="btn btn-secondary" onclick="window.close()">Close</button>

        <p class="countdown">Auto-redirecting in <span id="count">3</span>s…</p>
    </div>

    <script>
        // Get rideId from URL if present (passed via query param)
        const urlParams = new URLSearchParams(window.location.search);
        const rideId = urlParams.get('ride_id') || '';

        // Build deep link — points to payment-success screen in the app
        const deepLink = rideId
            ? `tripzo://screens/payment-success?rideId=${rideId}`
            : `tripzo://screens/payment-success`;

        document.getElementById('open-app-btn').href = deepLink;

        // Auto-redirect countdown
        let count = 3;
        const countEl = document.getElementById('count');
        const timer = setInterval(() => {
            count--;
            countEl.textContent = count;
            if (count <= 0) {
                clearInterval(timer);
                window.location.href = deepLink;
                // Fallback: close browser after a moment (for in-app WebBrowser)
                setTimeout(() => { try { window.close(); } catch(e) {} }, 800);
            }
        }, 1000);

        // Confetti generator
        const colors = ['#F59E0B','#276EF1','#22C55E','#EC4899','#8B5CF6','#ffffff'];
        const container = document.getElementById('confetti');
        for (let i = 0; i < 40; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.left = Math.random() * 100 + 'vw';
            dot.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            dot.style.animationDuration = (1.5 + Math.random() * 2) + 's';
            dot.style.animationDelay = (Math.random() * 3) + 's';
            dot.style.width = dot.style.height = (5 + Math.random() * 7) + 'px';
            container.appendChild(dot);
        }
    </script>
</body>
</html>
