worker_processes auto;

events {
    worker_connections 2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream backend-api {
        server backend:8000;
        keepalive 32;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # =========================
        # DJANGO API
        # =========================
        location /api/ {
            proxy_pass http://backend-api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # =========================
        # DJANGO ADMIN
        # =========================
        location /admin/ {
            proxy_pass http://backend-api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =========================
        # WEBSOCKET (LIVE MAP)
        # =========================
        location /ws/ {
            proxy_pass http://backend-api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_buffering off;
        }

        # =========================
        # STATIC FILES (DJANGO)
        # =========================
        # Using ^~ to prevent regex collision for Django assets
        location ^~ /static/ {
            alias /static/;
            expires 30d;
            add_header Cache-Control "public, immutable" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }

        location ^~ /media/ {
            alias /media/;
            expires 7d;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }

        # =========================
        # ADMIN DASHBOARD
        # =========================
        location /dashboard/ {
            alias /usr/share/nginx/admin/;
            index index.html;
            try_files $uri $uri/ /dashboard/index.html;

            # NEVER cache index.html
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }

        # Admin Dashboard Assets (Hashed filenames)
        location ~ ^/dashboard/(.+\.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot))$ {
            alias /usr/share/nginx/admin/$1;
            expires 30d;
            add_header Cache-Control "public, immutable" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }

        # =========================
        # RIDER APP
        # =========================
        location / {
            root /usr/share/nginx/rider;
            index index.html;
            try_files $uri $uri/ /index.html;

            # NEVER cache index.html
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }

        # Rider App Assets (Hashed filenames)
        location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
            root /usr/share/nginx/rider;
            expires 30d;
            add_header Cache-Control "public, immutable" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }

        # =========================
        # HEALTH CHECK
        # =========================
        location /health {
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
