 sonar.projectKey=uber_backend-clone
sonar.projectName=Uber Backend Clone
sonar.projectVersion=1.0
sonar.python.version=3.11
sonar.sourceEncoding=UTF-8

# Source and test roots
sonar.sources=backend/apps,backend/consumers
sonar.tests=backend/tests

# Coverage reports
sonar.python.coverage.reportPaths=backend/coverage.xml

# Exclusions from SonarQube analysis entirely (ignores these files)
sonar.exclusions=**/migrations/**,**/admin.py,**/apps.py,backend/scripts/**,backend/simulate_*.py,backend/fix_*.py,backend/*.sh,backend/diag.py

# Exclusions strictly for coverage (files will be scanned but not penalized for coverage missing)
sonar.coverage.exclusions=**/tests/**,**/*test*.py,**/migrations/**,**/__init__.py,**/conftest.py
